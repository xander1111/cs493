services:
  mongo-server:
    image: mongo:7.0
    env_file:
      - example.env
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet \"mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin?authSource=admin\" --eval \"db.adminCommand({ ping: 1 })\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s


  mongo-init:
    build: ./init 
    env_file:
      - example.env
    environment:
      MONGO_HOST: "mongo-server"
      MONGO_ROOT_DB: "admin"
    depends_on:
      mongo-server:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

  api-server:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - example.env
    environment:
      MONGO_HOST: "mongo-server"
      RABBITMQ_HOST: "rabbitmq"
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  thumbnail-gen:
    build: ./thumbnail-gen
    environment:
      RABBITMQ_HOST: "rabbitmq"
    depends_on:
      rabbitmq:
        condition: service_healthy
